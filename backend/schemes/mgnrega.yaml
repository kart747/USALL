scheme_id: mgnrega
name: "Mahatma Gandhi National Rural Employment Guarantee Act (MGNREGA)"
name_hindi: "मनरेगा"
benefit: "Guaranteed up to 100 days of unskilled manual labour per rural household per year; daily wage as per state rates"
ministry: "Ministry of Rural Development"
last_updated: "2024-08"

eligibility:
  required:
    - field: location_type
      operator: equals
      value: rural
      reason: "MGNREGA is for rural residents"
    - field: age
      operator: greater_than_or_equal
      value: 18
      reason: "Applicant must be 18+ to register for work"
    - field: willing_to_work
      operator: equals
      value: true
      reason: "Applicant must be willing to perform unskilled manual work"
  exclusions: []

documents_required:
  - "Photo ID (Aadhaar / Voter ID)"
  - "Address proof (village certificate / Gram Panchayat attestation)"

application_route:
  type: local_panchayat
  instruction: "Visit your Gram Panchayat or nearest CSC to request MGNREGA Job Card registration. The Panchayat issues a Job Card; request work and register daily attendance. If work not provided within 15 days, ask for unemployment allowance."

human_in_loop_trigger:
  - field: job_card_issuance
    reason: "Job Card must be issued by Gram Panchayat; VLE/Panchayat assistance is procedural and required"
