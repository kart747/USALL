scheme_id: pmjay
name: "Pradhan Mantri Jan Arogya Yojana (PM-JAY / Ayushman Bharat)"
name_hindi: "प्रधान मंत्री जन आरोग्य योजना"
benefit: "Up to ₹5,00,000/family/year cashless hospitalization coverage"
ministry: "Ministry of Health and Family Welfare"
last_updated: "2024-09"

eligibility:
  any_of:
    - field: secc_deprivation
      operator: equals
      value: true
      reason: "SECC 2011 deprivation criteria beneficiaries are targeted"
    - field: age
      operator: greater_than_or_equal
      value: 70
      reason: "Age 70+ direct eligibility as per Sept 2024 update"
  exclusions: []

special_override:
  - name: age_70_bypass
    condition:
      field: age
      operator: greater_than_or_equal
      value: 70
    effect: "Bypass all income and SECC criteria; treat as direct eligibility for PMJAY"
    reason: "Sept 2024 update: age 70+ bypasses income/SECC requirements"

documents_required:
  - "Aadhaar Card"
  - "Bank Passbook (Aadhaar-seeded)"
  - "Ration Card or Family ID (if available)"
  - "Any ID proof used in SECC listing (if available)"

application_route:
  type: csc
  instruction: "Visit your nearest CSC for PMJAY verification/enrolment. VLE will check SECC listing or apply using age-based override."

human_in_loop_trigger:
  - field: aadhaar_verification_needed
    reason: "Biometric/Aadhaar verification often required at CSC for final entitlement confirmation"
